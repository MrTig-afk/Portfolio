<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="FinanceTracker app icon">
  <title>FinanceTracker app icon</title>
  <!-- Background follows the browser/OS colour scheme: dark by default, white in
       light mode. The coloured arcs read well on either, so only the plate flips. -->
  <style>
    .ft-plate { fill: #171b26; }
    @media (prefers-color-scheme: light) {
      .ft-plate { fill: #ffffff; }
    }
  </style>
  <rect class="ft-plate" width="64" height="64" rx="15"></rect>
  <g fill="none" stroke-width="7" stroke-linecap="butt">
    <circle cx="32" cy="32" r="18" stroke="#57b26f" stroke-dasharray="14.45 98.7" transform="rotate(-83 32 32)"></circle>
    <circle cx="32" cy="32" r="18" stroke="#4a90d9" stroke-dasharray="14.45 98.7" transform="rotate(-23 32 32)"></circle>
    <circle cx="32" cy="32" r="18" stroke="#9b6cd4" stroke-dasharray="14.45 98.7" transform="rotate(37 32 32)"></circle>
    <circle cx="32" cy="32" r="18" stroke="#e0913f" stroke-dasharray="14.45 98.7" transform="rotate(97 32 32)"></circle>
    <circle cx="32" cy="32" r="18" stroke="#34a7a3" stroke-dasharray="14.45 98.7" transform="rotate(157 32 32)"></circle>
    <circle cx="32" cy="32" r="18" stroke="#d96ba6" stroke-dasharray="14.45 98.7" transform="rotate(217 32 32)"></circle>
  </g>
</svg>
